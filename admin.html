<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – DesignVoter</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FFB9E5'/></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-search {
      max-width: 520px;
      margin: 0 auto 2rem;
    }
    .admin-search input {
      width: 100%;
      padding: .7rem 1.1rem;
      border: 1.5px solid var(--rule);
      border-radius: var(--radius-pill);
      background: var(--cream-2);
      font-family: inherit;
      font-size: 1rem;
      color: var(--forest-ink);
      outline: none;
      transition: border-color .15s;
    }
    .admin-search input:focus { border-color: var(--forest); }
    .admin-card {
      background: var(--cream-2);
      border: 1px solid var(--rule-soft);
      border-radius: var(--radius-card);
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .admin-card-thumbs {
      display: flex;
      gap: .5rem;
      flex-shrink: 0;
    }
    .admin-card-thumbs img {
      width: 72px;
      height: 54px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--rule-soft);
    }
    .admin-card-body {
      flex: 1;
      min-width: 0;
    }
    .admin-card-title {
      font-family: 'Onest', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: .2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .admin-card-meta {
      font-size: .8rem;
      color: var(--emerald);
      opacity: .75;
    }
    .btn-delete {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--error);
      color: var(--error);
      border-radius: var(--radius-pill);
      padding: .4rem 1rem;
      font-family: 'Onest', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      align-self: center;
    }
    .btn-delete:hover { background: var(--error); color: #fff; }
    .admin-count {
      font-family: 'Onest', sans-serif;
      font-size: .85rem;
      color: var(--forest);
      opacity: .6;
      margin-bottom: 1.25rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div></div>
    <a href="index.html" class="nav-logo">DesignVoter<span style="color:var(--pink-ink)">.com</span></a>
    <div class="nav-links">
      <a href="upload.html" class="nav-link">Upload</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <button id="logout-btn" class="nav-link">Sign out</button>
    </div>
  </nav>

  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-hero-left">
        <span class="page-hero-numeral">★</span>
        <div class="page-hero-rule"></div>
        <span class="page-hero-label">Admin</span>
      </div>
      <div class="page-hero-right">
        <h1 class="page-hero-heading">All posts.<br><em class="page-hero-em">Manage everything.</em></h1>
      </div>
    </div>
  </div>

  <main class="dash-main">
    <div id="admin-loading" class="state-center">
      <div class="spinner"></div>
    </div>

    <div id="admin-content" class="hidden">
      <div class="admin-search">
        <input type="search" id="search-input" placeholder="Search by title…" autocomplete="off">
      </div>
      <p id="admin-count" class="admin-count"></p>
      <div id="admin-list"></div>
    </div>
  </main>

  <script type="module" src="admin.js"></script>
  <script type="module" src="parallax.js"></script>
</body>
</html>
