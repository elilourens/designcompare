<body>

  <nav class="nav">
    <div></div>
    <a href="index.html" class="nav-logo">DesignVoter<span style="color:var(--pink-ink)">.com</span></a>
    <div class="nav-links">
      <a href="dashboard.html" id="dashboard-link" class="nav-link hidden">Dashboard</a>
      <a href="upload.html" id="upload-link" class="nav-link hidden">Upload</a>
      <a href="login.html" id="login-link" class="nav-link-text">Sign in</a>
      <button id="logout-btn" class="nav-link hidden">Sign out</button>

  <div class="cta-banner" id="cta-banner">
    <span class="cta-banner-text">Test your designs <span class="cta-now"><span class="cta-now-text">right now</span><span class="cta-now-highlight"></span></span></span>
    <a href="upload.html" class="cta-banner-btn">add your designs</a>
    <button class="cta-close" onclick="document.getElementById('cta-banner').classList.add('cta-banner--collapsed')" aria-label="Dismiss">&times;</button>
  </div>

  <div id="vote-backdrop"></div>
  <div id="zoom-overlay" onclick="closeZoom()">
    <img id="zoom-img" src="" alt="">
  </div>
  <main class="compare-main">
    <div id="loading" class="hidden">
      <p class="compare-hint">
        <span class="compare-hint-question skeleton-line" style="width:55%;height:2.8rem;display:inline-block;border-radius:6px;"></span>
      </p>
      <div class="designs-grid">
        <div class="design-card-wrap">
          <div class="skeleton-label"></div>
          <div class="skeleton-card"></div>
        </div>
        <div class="design-card-wrap">
          <div class="skeleton-label"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </div>

    <div id="done" class="state-center hidden">
      <h2>You've seen everything</h2>
      <p class="done-pill">Check back later for new comparisons</p>
    </div>

    <div id="compare-view" class="hidden">
      <p class="compare-hint"><span class="compare-hint-question">A or B?</span></p>
      <div class="designs-grid">
        <div class="design-card-wrap">
          <div class="design-letter">A</div>
          <button class="design-card" id="card-a" onclick="vote('a')">
            <img id="img-a" src="" alt="Design A">
            <div class="inline-bar hidden" id="inline-bar-a">
              <div class="inline-bar-track"><div class="inline-bar-fill" id="bar-a"></div></div>
              <span class="inline-bar-pct" id="pct-a">0%</span>
            </div>
            <span class="zoom-btn" onclick="openZoom('img-a', event)">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/></svg>
            </span>
          </button>
        </div>
        <div class="design-card-wrap">
          <div class="design-letter">B</div>
          <button class="design-card" id="card-b" onclick="vote('b')">
            <img id="img-b" src="" alt="Design B">
            <div class="inline-bar hidden" id="inline-bar-b">
              <div class="inline-bar-track"><div class="inline-bar-fill" id="bar-b"></div></div>
              <span class="inline-bar-pct" id="pct-b">0%</span>
            </div>
            <span class="zoom-btn" onclick="openZoom('img-b', event)">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/></svg>
            </span>
          </button>
        </div>
      </div>
      <div class="design-title-badge" id="design-title"></div>
    </div>
  </main>

  <canvas id="grid-pink" aria-hidden="true"></canvas>

  <script>
    function openZoom(imgId, e) {
      e.stopPropagation()
      const src = document.getElementById(imgId).src
      document.getElementById('zoom-img').src = src
      document.getElementById('zoom-overlay').classList.add('active')
    }
    function closeZoom() {
      document.getElementById('zoom-overlay').classList.remove('active')
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeZoom() })
  </script>
  <script type="module" src="app.js"></script>
  <script type="module" src="parallax.js"></script>
  <script>
    (function () {
      const CELL_W = 40, CELL_H = 40
      const PAD = 0
      const REVEAL_MS = 1400
      const CREAM = '#FDFCF7'
      const PAL = [
        CREAM, CREAM, CREAM, CREAM, CREAM,
        CREAM, CREAM, CREAM, CREAM, CREAM,
        CREAM, '#fff0f8', '#ffe6f4', '#FFB9E5',
      ]

      const canvas = document.getElementById('grid-pink')
      const ctx = canvas.getContext('2d')

      let bgTiles = [], bgMaxDist = 0
      let revealRafId = null

      function build() {
        // Oversize the canvas by one cell each side so parallax shift never shows edge
        canvas.width  = window.innerWidth  + CELL_W * 2
        canvas.height = window.innerHeight + CELL_H * 2

        const cols = Math.ceil(canvas.width  / CELL_W) + 1
        const rows = Math.ceil(canvas.height / CELL_H) + 1
        bgTiles = []

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const dx = c - cols / 2
            const dy = r - rows / 2
            bgTiles.push({ r, c, color: CREAM, dist: Math.sqrt(dx * dx + dy * dy), drawn: false })
          }
        }
        bgMaxDist = Math.max(...bgTiles.map(t => t.dist))
      }

      function runTileReveal() {
        if (revealRafId) cancelAnimationFrame(revealRafId)
        for (const tile of bgTiles) {
          tile.color = PAL[Math.floor(Math.random() * PAL.length)]
          tile.drawn = false
        }
        const revealStart = performance.now()
        function step(now) {
          const p = Math.min((now - revealStart) / REVEAL_MS, 1)
          const threshold = (1 - Math.pow(1 - p, 2.2)) * bgMaxDist
          for (const tile of bgTiles) {
            if (!tile.drawn && tile.dist <= threshold) {
              tile.drawn = true
              ctx.fillStyle = tile.color
              ctx.fillRect(
                tile.c * CELL_W + PAD,
                tile.r * CELL_H + PAD,
                CELL_W - PAD * 2,
                CELL_H - PAD * 2
              )
            }
          }
          if (p < 1) revealRafId = requestAnimationFrame(step)
        }
        revealRafId = requestAnimationFrame(step)
      }

      window.triggerGridReveal = runTileReveal

      build()
      runTileReveal()
      window.addEventListener('resize', () => { build(); runTileReveal() })
    })()
  </script>
</body>
</html>
