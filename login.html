<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in – DesignVoter</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FFB9E5'/></svg>">
  <link rel="stylesheet" href="style.css">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-PZ6ZZRGV');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PZ6ZZRGV"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <nav class="nav">
    <div></div>
    <a href="index.html" class="nav-logo">DesignVoter<span style="color:var(--pink-ink)">.com</span></a>
    <div></div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <p class="auth-card-title display">Welcome back</p>
      <p class="auth-card-sub">Sign in to upload and manage comparisons</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">sign in</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">sign up</button>
      </div>

      <button class="btn-google" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.259c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <label>email
          <input type="email" id="login-email" required autocomplete="email">
        </label>
        <label>password
          <input type="password" id="login-password" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn-primary">sign in</button>
        <p id="login-error" class="form-error hidden"></p>
      </form>

      <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
        <label>username
          <input type="text" id="signup-username" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+">
        </label>
        <label>email
          <input type="email" id="signup-email" required autocomplete="email">
        </label>
        <label>password
          <input type="password" id="signup-password" required minlength="6" autocomplete="new-password">
        </label>
        <button type="submit" class="btn-primary">create account</button>
        <p id="signup-error" class="form-error hidden"></p>
        <p id="signup-success" class="form-success hidden">Check your email to confirm your account.</p>
      </form>
    </div>
  </main>

  <script type="module" src="auth.js"></script>
  <script type="module" src="parallax.js"></script>
</body>
</html>
