<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload – DesignVoter</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FFB9E5'/></svg>">
  <link rel="stylesheet" href="style.css">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-PZ6ZZRGV');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PZ6ZZRGV"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <nav class="nav">
    <div></div>
    <a href="index.html" class="nav-logo">DesignVoter<span style="color:var(--pink-ink)">.com</span></a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <button id="logout-btn" class="nav-link">sign out</button>
    </div>
  </nav>

  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-hero-left">
        <span class="page-hero-numeral">II.</span>
        <div class="page-hero-rule"></div>
        <span class="page-hero-label">New comparison</span>
      </div>
      <div class="page-hero-right">
        <h1 class="page-hero-heading">Upload. Share.<br><em class="page-hero-em">Let the crowd decide.</em></h1>
      </div>
    </div>
  </div>

  <main class="upload-main">

    <form id="upload-form" onsubmit="handleUpload(event)">
      <label>title
        <input type="text" id="title" required maxlength="100" placeholder="e.g. Homepage redesign">
      </label>
      <label>description <span class="optional">(optional)</span>
        <textarea id="description" rows="2" maxlength="300" placeholder="What are you testing?"></textarea>
      </label>

      <div class="upload-row">
        <div class="upload-slot">
          <p class="slot-label">design a</p>
          <div class="drop-zone" id="drop-a" onclick="document.getElementById('file-a').click()">
            <img id="preview-a" class="hidden" alt="Preview A">
            <span id="drop-hint-a">click to select image</span>
          </div>
          <input type="file" id="file-a" accept="image/*" class="hidden" onchange="previewFile('a')">
        </div>
        <div class="upload-slot">
          <p class="slot-label">design b</p>
          <div class="drop-zone" id="drop-b" onclick="document.getElementById('file-b').click()">
            <img id="preview-b" class="hidden" alt="Preview B">
            <span id="drop-hint-b">click to select image</span>
          </div>
          <input type="file" id="file-b" accept="image/*" class="hidden" onchange="previewFile('b')">
        </div>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">publish comparison</button>
      <p id="upload-error" class="form-error hidden"></p>
      <p id="upload-success" class="form-success hidden"></p>
    </form>

    <section class="my-designs">
      <h2>Your comparisons</h2>
      <div class="my-designs-rule"></div>
      <div id="my-list" class="my-list">
        <div class="spinner"></div>
      </div>
    </section>
  </main>

  <!-- Paywall modal -->
  <div id="paywall-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <h2 class="modal-title">You've used your 3 free uploads</h2>
      <p class="modal-body">Each additional comparison is <strong>£9.99</strong> — pay once, publish once. No subscription.</p>
      <div class="modal-actions">
        <button class="btn-primary" id="paywall-pay-btn">Pay £9.99 to publish</button>
        <button class="btn-ghost" onclick="document.getElementById('paywall-modal').classList.add('hidden')">Maybe later</button>
      </div>
    </div>
  </div>

  <script type="module" src="upload.js"></script>
  <script type="module" src="parallax.js"></script>
</body>
</html>
